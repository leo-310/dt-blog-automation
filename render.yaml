services:
  - type: web
    name: blog-agent
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: BLOG_AGENT_API_HOST
        value: 0.0.0.0
      - key: BLOG_AGENT_API_PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: MYSHOPIFY_DOMAIN
        sync: false
      - key: BLOG_AGENT_USE_NOTION
        value: "1"
      - key: NOTION_API_TOKEN
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false
      - key: NOTION_PILLARS_DB_ID
        sync: false
      - key: NOTION_BLOG_PIPELINE_DB_ID
        sync: false
      - key: NOTION_SETTINGS_DB_ID
        sync: false
      - key: BLOG_AGENT_USE_SUPABASE_NAMESPACE
        value: "0"
      - key: BLOG_AGENT_BACKGROUND_LOOP
        value: "0"

  - type: cron
    name: blog-agent-automation-tick
    runtime: docker
    schedule: "* * * * *"
    dockerCommand: 'sh -lc ''python -c "import os,json,sys,urllib.request; url=os.environ.get(\"BLOG_AGENT_TICK_URL\", \"\").strip(); (not url) and (print(\"BLOG_AGENT_TICK_URL is required for cron automation.\", file=sys.stderr) or sys.exit(2)); req=urllib.request.Request(url, data=json.dumps({}).encode(\"utf-8\"), headers={\"Content-Type\":\"application/json\"}, method=\"POST\"); resp=urllib.request.urlopen(req, timeout=120); body=resp.read().decode(\"utf-8\", errors=\"replace\"); print(f\"POST {url} -> {resp.status}\"); print(body[:800])"'''
    envVars:
      - key: BLOG_AGENT_TICK_URL
        sync: false

